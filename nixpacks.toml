[phases.setup]
nixPkgs = ["python311", "uv", "nodejs", "pnpm"]

[phases.install]
cmds = [
    "if [ \"$APP_TYPE\" = \"frontend\" ]; then cd frontend && pnpm install; else cd api && uv sync --no-dev --frozen; fi"
]

[phases.build]
cmds = [
    "if [ \"$APP_TYPE\" = \"frontend\" ]; then cd frontend && pnpm run build; fi"
]

[start]
cmd = "if [ \"$APP_TYPE\" = \"frontend\" ]; then cd frontend && pnpm run start; else cd api && python -m uv run arq app.workers.main.WorkerSettings & cd api && python -m uv run uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}; fi"
